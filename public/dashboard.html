<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard – Timetable Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #4f6ef7;
      --accent2:   #7c3aed;
      --green:     #22c55e;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }

    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono);
      font-size: 15px; font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    .nav-right {
      display: flex; align-items: center; gap: 16px;
    }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .user-chip span { color: var(--text); font-weight: 500; }

    .btn-signout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-signout:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .page-header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .btn-new {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 0 20px rgba(79,110,247,0.3);
    }

    .btn-new:hover {
      background: #3b5bdb;
      box-shadow: 0 0 28px rgba(79,110,247,0.5);
      transform: translateY(-1px);
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      margin-bottom: 28px;
    }

    .search-bar svg { color: var(--muted); flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--sans);
      padding: 12px 0;
    }

    .search-bar input::placeholder { color: var(--muted); }

    /* ── PROJECTS GRID ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity .2s;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .project-card:hover::before { opacity: 1; }

    .project-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .project-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .project-menu-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 18px;
      line-height: 1;
      transition: color .15s;
    }

    .project-menu-btn:hover { color: var(--text); }

    .project-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .project-meta span { display: flex; align-items: center; gap: 4px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
    }

    .badge-done {
      background: rgba(34,197,94,0.12);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.2);
    }

    .badge-draft {
      background: rgba(100,116,139,0.15);
      color: var(--muted);
      border: 1px solid rgba(100,116,139,0.2);
    }

    /* ── CARD ACTIONS BAR ── */
    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-action-btn {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 4px;
      font-size: 11px;
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .card-action-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(79,110,247,0.08);
    }

    .card-action-btn.danger:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(239,68,68,0.08);
    }

    /* ── DROPDOWN MENU ── */
    .dropdown {
      position: absolute;
      top: 48px; right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 50;
      min-width: 150px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      display: none;
    }

    .dropdown.open { display: block; }

    .dropdown button {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      text-align: left;
      transition: background .15s;
    }

    .dropdown button:hover { background: var(--border); }
    .dropdown button.danger { color: var(--red); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .modal p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }

    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--sans);
      padding: 10px 13px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 20px;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 14px;
      font-family: var(--sans);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-create {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 7px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: background .2s;
    }

    .btn-create:hover { background: #3b5bdb; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    /* loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 16px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-brand" href="#">
    <span class="logo-dot"></span>
    timetable<span style="color:var(--accent)">.</span>gen
  </a>
  <div class="nav-right">
    <div class="user-chip">👤 <span id="navEmail">—</span></div>
    <button class="btn-signout" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <div>
      <h1>Your Projects</h1>
      <p>Open a project to edit inputs and view the generated timetable</p>
    </div>
    <button class="btn-new" onclick="openNewModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New Project
    </button>
  </div>

  <div class="search-bar">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search projects…" oninput="renderProjects()"/>
  </div>

  <div class="projects-grid" id="projectsGrid">
    <!-- filled by JS -->
  </div>
</main>

<!-- NEW PROJECT MODAL -->
<div class="modal-backdrop" id="newModal">
  <div class="modal">
    <h2>New Project</h2>
    <p>Give your timetable project a name to get started.</p>
    <label>Project Name</label>
    <input type="text" id="newProjectName" placeholder="e.g. Semester 5 – CSE" maxlength="60"
      onkeydown="if(event.key==='Enter') createProject()"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewModal()">Cancel</button>
      <button class="btn-create" onclick="createProject()">Create Project</button>
    </div>
  </div>
</div>

<!-- RENAME MODAL -->
<div class="modal-backdrop" id="renameModal">
  <div class="modal">
    <h2>Rename Project</h2>
    <p>Enter a new name for this project.</p>
    <label>Project Name</label>
    <input type="text" id="renameInput" maxlength="60"
      onkeydown="if(event.key==='Enter') confirmRename()"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRenameModal()">Cancel</button>
      <button class="btn-create" onclick="confirmRename()">Rename</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API   = '';  // relative — works on any host
const TOKEN = sessionStorage.getItem('auth_token');
const EMAIL = sessionStorage.getItem('auth_email');

if (!TOKEN) location.href = 'login.html';
document.getElementById('navEmail').textContent = EMAIL || '';

// ── API helper ──
async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}`, ...(options.headers||{}) }
  });
  if (res.status === 401) { doLogout(); return null; }
  return res.json();
}

let allProjects = [];

// ── Load from server ──
async function loadAndRender() {
  const grid = document.getElementById('projectsGrid');
  grid.innerHTML = `<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--muted);font-size:14px">Loading projects…</div>`;
  const data = await apiFetch('/api/projects');
  if (!data) return;
  allProjects = data.projects || [];
  renderProjects();
}

// ── Render list ──
function renderProjects() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim().replace(/\s+/g, ' ');
  const projects = allProjects.filter(p => p.name.toLowerCase().trim().replace(/\s+/g, ' ').includes(query));
  const grid = document.getElementById('projectsGrid');

  if (projects.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📋</div>
        <h3>${query ? 'No projects match your search' : 'No projects yet'}</h3>
        <p>${query ? 'Try a different search term.' : 'Create your first timetable project to get started.'}</p>
        ${!query ? `<button class="btn-new" onclick="openNewModal()">+ New Project</button>` : ''}
      </div>`;
    return;
  }

  grid.innerHTML = projects.map(p => {
    const date = new Date(p.updatedAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    return `
    <div class="project-card" onclick="openProject('${p.id}')">
      <div style="position:relative">
        <div class="project-card-top">
          <div class="project-icon">📚</div>
          <button class="project-menu-btn" onclick="event.stopPropagation(); toggleMenu('menu-${p.id}')">⋯</button>
        </div>
        <div class="dropdown" id="menu-${p.id}">
          <button onclick="event.stopPropagation(); duplicateProject('${p.id}')">📋 Duplicate</button>
        </div>
      </div>
      <div class="project-name">${escHtml(p.name)}</div>
      <div class="project-meta">
        <span>🕐 ${date}</span>
        <span class="badge ${p.hasOutput ? 'badge-done' : 'badge-draft'}">${p.hasOutput ? 'Generated' : 'Draft'}</span>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-action-btn" onclick="openProject('${p.id}')">📂 Open</button>
        <button class="card-action-btn" onclick="startRename('${p.id}', '${escHtml(p.name)}')">✏️ Rename</button>
        <button class="card-action-btn danger" onclick="deleteProject('${p.id}')">🗑️ Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Menu toggle ──
let openMenu = null;
function toggleMenu(id) {
  const el = document.getElementById(id);
  if (openMenu && openMenu !== el) openMenu.classList.remove('open');
  el.classList.toggle('open');
  openMenu = el.classList.contains('open') ? el : null;
}
document.addEventListener('click', () => { if (openMenu) { openMenu.classList.remove('open'); openMenu = null; } });

// ── Open ──
function openProject(id) {
  sessionStorage.setItem('active_project_id', id);
  location.href = 'index.html';
}

// ── Create ──
function openNewModal() {
  document.getElementById('newProjectName').value = '';
  document.getElementById('newModal').classList.add('open');
  setTimeout(() => document.getElementById('newProjectName').focus(), 100);
}
function closeNewModal() { document.getElementById('newModal').classList.remove('open'); }

async function createProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  const data = await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify({ name }) });
  if (!data || !data.success) { showToast('❌ Failed to create project'); return; }
  closeNewModal();
  showToast('Project created!');
  sessionStorage.setItem('active_project_id', data.project.id);
  location.href = 'index.html';
}

// ── Rename ──
let renamingId = null;
function startRename(id, currentName) {
  renamingId = id;
  document.getElementById('renameInput').value = currentName;
  document.getElementById('renameModal').classList.add('open');
  setTimeout(() => document.getElementById('renameInput').focus(), 100);
}
function closeRenameModal() { document.getElementById('renameModal').classList.remove('open'); renamingId = null; }

async function confirmRename() {
  const name = document.getElementById('renameInput').value.trim();
  if (!name || !renamingId) return;
  await apiFetch(`/api/projects/${renamingId}`, { method: 'PUT', body: JSON.stringify({ name }) });
  closeRenameModal();
  await loadAndRender();
  showToast('Project renamed.');
}

// ── Duplicate ──
async function duplicateProject(id) {
  const data = await apiFetch(`/api/projects/${id}`);
  if (!data || !data.project) return;
  const p = data.project;
  const created = await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify({ name: p.name + ' (copy)' }) });
  if (!created || !created.success) return;
  await apiFetch(`/api/projects/${created.project.id}`, {
    method: 'PUT',
    body: JSON.stringify({
      standards: p.standards, faculty: p.faculty, assignments: p.assignments,
      classrooms: p.classrooms, selectedDays: p.selectedDays, timeSlotValues: p.timeSlotValues,
      scheduleData: p.scheduleData, scheduleStats: p.scheduleStats, generatedFilename: p.generatedFilename
    })
  });
  await loadAndRender();
  showToast('Project duplicated.');
}

// ── Delete ──
async function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  await apiFetch(`/api/projects/${id}`, { method: 'DELETE' });
  allProjects = allProjects.filter(p => p.id !== id);
  renderProjects();
  showToast('Project deleted.');
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function doLogout() {
  sessionStorage.removeItem('auth_token');
  sessionStorage.removeItem('auth_email');
  location.href = 'login.html';
}

loadAndRender();
</script>
</body>
</html>
