<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Timetable Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'IBM Plex Sans', sans-serif; }

    body {
      min-height: 100vh;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-area .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .logo-area h1 {
      font-size: 24px;
      color: #e2e8f0;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
    }

    .logo-area p {
      color: #64748b;
      font-size: 14px;
      margin-top: 6px;
    }

    .login-card {
      background: #1a1d27;
      border: 1px solid #2e3250;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .login-card h2 {
      font-size: 20px;
      color: #e2e8f0;
      margin-bottom: 6px;
    }

    .login-card .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #2e3250;
      border-radius: 8px;
      font-size: 14px;
      color: #e2e8f0;
      transition: border-color 0.25s, box-shadow 0.25s;
      background: #22263a;
    }

    input:focus {
      outline: none;
      border-color: #4f6ef7;
      background: #22263a;
      box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
    }

    .hint {
      font-size: 11.5px;
      color: #475569;
      margin-top: 5px;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #475569;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
    }

    .toggle-pw:hover { color: #94a3b8; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 8px;
      box-shadow: 0 0 20px rgba(79,110,247,0.3);
    }

    .btn-login:hover:not(:disabled) {
      background: #3b5bdb;
      box-shadow: 0 0 28px rgba(79,110,247,0.5);
      transform: translateY(-1px);
    }

    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .alert {
      padding: 12px 14px;
      border-radius: 7px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show { display: block; }

    .alert-error   { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .alert-success { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }

    .domain-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(79,110,247,0.15);
      color: #818cf8;
      border: 1px solid rgba(79,110,247,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 22px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="logo-area">
    <span class="icon">📚</span>
    <h1>Timetable Generator</h1>
    <p>Conflict-free scheduling with Genetic Algorithms</p>
  </div>

  <div class="login-card">
    <h2>Welcome back 👋</h2>
    <p class="subtitle">Sign in to access the timetable generator</p>

    <div id="alertBox" class="alert"></div>

    <div class="form-group">
      <label for="emailInput">Institutional Email</label>
      <input
        type="email"
        id="emailInput"
        placeholder="yourname@diu.iiitvadodara.ac.in"
        autocomplete="email"
      />
      <div class="hint">Only @diu.iiitvadodara.ac.in emails are accepted</div>
    </div>

    <div class="form-group">
      <label for="passwordInput">Password</label>
      <div class="password-wrapper">
        <input
          type="password"
          id="passwordInput"
          placeholder="Enter your password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()"
        />
        <button class="toggle-pw" onclick="togglePassword()" title="Show/hide password">👁</button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span class="spinner" id="spinner"></span>
      Sign In
    </button>

    <div style="text-align:center;">
      <span class="domain-badge">🔒 @diu.iiitvadodara.ac.in only</span>
    </div>
  </div>

  <footer>IIIT Vadodara – DIU Campus &nbsp;|&nbsp; Timetable Generator v1.0</footer>
</div>

<script>
  const API_BASE_URL = '';  // relative — works on any host

  // If already logged in, go straight to app
  if (sessionStorage.getItem('auth_token')) {
    window.location.href = '/dashboard.html';
  }

  function showAlert(message, type) {
    const box = document.getElementById('alertBox');
    box.textContent = message;
    box.className = `alert alert-${type} show`;
  }

  function hideAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  function togglePassword() {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    hideAlert();
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    // Client-side domain check (server also enforces this)
    if (!email.endsWith('@diu.iiitvadodara.ac.in')) {
      showAlert('❌ Only @diu.iiitvadodara.ac.in email addresses are allowed.', 'error');
      return;
    }

    if (!password) {
      showAlert('Please enter your password.', 'error');
      return;
    }

    const btn     = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled  = true;
    spinner.style.display = 'inline-block';

    try {
      const res  = await fetch(`${API_BASE_URL}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok && data.success) {
        sessionStorage.setItem('auth_token', data.token);
        sessionStorage.setItem('auth_email', data.email);
        showAlert('✅ Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } else {
        showAlert('❌ ' + (data.error || 'Invalid email or password.'), 'error');
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    } catch (err) {
      showAlert('⚠️ Cannot reach the server. Make sure the backend is running on port 5000.', 'error');
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }
</script>
</body>
</html>
